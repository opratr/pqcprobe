name: Lint & Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint:
    name: Ruff + Bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install hash-pinned tools
        run: python -m pip install --require-hashes -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Bandit (SAST, fail on medium+ severity)
        run: bandit -r pqcprobe.py -c pyproject.toml --severity-level medium

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt
