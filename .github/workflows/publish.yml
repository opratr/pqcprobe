name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, using PyPI Trusted
# Publishing (OIDC) — no API tokens are stored in the repo.
#
# One-time setup on PyPI before the first release:
#   Create a "pending" trusted publisher for project "pqcprobe" pointing at this
#   repository, workflow file "publish.yml", and environment "pypi".
#   https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
